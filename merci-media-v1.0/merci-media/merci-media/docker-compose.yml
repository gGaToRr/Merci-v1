services:

  # ── Backend Flask ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: merci-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - DEEZER_CONFIG=/etc/deezer-downloader.ini
      - DATABASE_URL=sqlite:////data/merci.db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Admin1234}
      - CORS_ORIGINS=http://localhost:${PORT:-8080}
      - DOWNLOAD_DIR=/mnt/deezer-downloader
    volumes:
      - ./data:/data
      - ./downloads:/mnt/deezer-downloader
    expose:
      - "5000"
    networks:
      - merci-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Frontend Nginx ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: merci-frontend
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - merci-net

networks:
  merci-net:
    driver: bridge
